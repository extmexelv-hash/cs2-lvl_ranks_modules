name: Build LVL Ranks Modules

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pisex/ubuntu20:latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - LR_ExStatsGeoIP
          - LR_ExStatsHits
          - LR_ExStatsMaps
          - LR_ExStatsWeapons
          - LR_FakeRanks
          - LR_GiveExp
          - LR_NameReward
          - LR_UnusualKills
          - LR_VIP_Multi

    env:
      HL2SDK_ROOT: "${{ github.workspace }}/external"
      MMS_PATH: "${{ github.workspace }}/external/metamod-source"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qy
          apt-get install -y git clang-10 clang++-10 binutils python3 python3-pip zip

          python3 -m pip install --upgrade pip importlib-metadata
          python3 -m pip install setuptools==45.2.0

          git clone https://github.com/alliedmodders/ambuild.git ambuild
          cd ambuild
          pip3 install .
          cd ..

          mkdir -p external
          cd external

          git clone --recursive --branch master --single-branch https://github.com/alliedmodders/metamod-source.git
          git clone --recursive --branch cs2 --single-branch https://github.com/alliedmodders/hl2sdk.git hl2sdk-cs2

          cd ..

          git clone https://github.com/pisex/SchemaEntity.git

      - name: Configure and build module
        run: |
          cd "${{ matrix.module }}"
          mkdir build
          cd build

          python3 ../configure.py \
            -s cs2 \
            --targets x86_64 \
            --enable-optimize \
            --hl2sdk-manifests=./hl2sdk-manifests \
            --mms_path=$MMS_PATH \
            --hl2sdk-root=$HL2SDK_ROOT

          ambuild

      - name: Package module
        run: |
          cd "${{ matrix.module }}/build/package"
          zip -r "${{ github.workspace }}/${{ matrix.module }}-linux.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-linux
          path: ${{ matrix.module }}-linux.zip
